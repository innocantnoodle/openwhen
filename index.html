<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Scavenger Hunt 💛</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe4ec, #f8cdda, #e0c3fc);
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #444;
}

/* Card i midten */
.card {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
}

h2 {
    color: #d63384;
}

/* Knapper */
button {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background-color: #d63384;
    color: white;
    font-size: 15px;
    cursor: pointer;
    margin: 10px 5px 0 5px;
}

button:hover {
    background-color: #b0256a;
}

/* Progress bar */
.progress-container {
    width: 100%;
    background: #eee;
    border-radius: 20px;
    margin-bottom: 20px;
}

.progress-bar {
    height: 12px;
    width: 0%;
    background: #d63384;
    border-radius: 20px;
    transition: width 0.4s ease;
}

</style>
</head>

<body>

<div class="card">

<div class="progress-container">
    <div class="progress-bar" id="progress"></div>
</div>

<h2 id="title">💌 Hei baby</h2>

<p id="text">
Mens du er på tur... har eg laget en liten scavenger hunt til deg 😏<br><br>
Fullfør alle quests når det skulle passe for å unlocke premien din når du kommer hjem 💛
</p>

<div>
    <button onclick="prevQuest()">← Tilbake</button>
    <button onclick="nextQuest()">Neste →</button>
</div>

</div>

<script>
let step = 0;
let totalSteps = 7;

function updateProgress() {
    let percent = (step / totalSteps) * 100;
    document.getElementById("progress").style.width = percent + "%";
}

function renderQuest() {
    let title = document.getElementById("title");
    let text = document.getElementById("text");

    if (step === 0) {
        title.innerHTML = "💌 Hei baby";
        text.innerHTML = "Mens du er på tur... har eg laget en liten scavenger hunt til deg 😏<br><br>Fullfør alle quests når det skulle passe for å unlocke premien din når du kommer hjem 💛";
    }

    else if (step === 1) {
        title.innerHTML = " Quest 1";
        text.innerHTML = "Ta et bilde av noe som minner deg om meg på veien 💛";
    }

    else if (step === 2) {
        title.innerHTML = " Quest 2";
        text.innerHTML = "Finn en sang som minner deg om oss, og send den til meg 😌";
    }

    else if (step === 3) {
        title.innerHTML = " Quest 3";
        text.innerHTML = "Ta en hemmelig selfie et sted ingen vet du gjør dette 😏";
    }

    else if (step === 4) {
        title.innerHTML = " Quest 4";
        text.innerHTML = "Hva var det første du la merke til med meg når vi møttes? 💭";
    }

    else if (step === 5) {
        title.innerHTML = " Quest 5";
        text.innerHTML = "Beskriv hva du hadde gjort hvis vi var alene akkurat nå... 😝";
    }

    else if (step === 6) {
        title.innerHTML = " Bonus Quest";
        text.innerHTML = "Kjøp noe søtt og tenk på meg når du spiser det 💕";
    }

    else if (step === 7) {
        title.innerHTML = "Til slutt:";
        text.innerHTML = "Du har fullført alle quests... 😌<br><br>Premien din?<br><br>Et påskeeg venter på deg når du kommer deg hjem + meg 💛😝👀 Eg elsker deg til månen og til saturn 🌜🪐✨🥹😝";
    }

    else {
        title.innerHTML = "💛";
        text.innerHTML = "Eg elsker deg til månen og til saturn 🌜🪐✨🥹😝";
    }

    updateProgress();
}

function nextQuest() {
    if (step < totalSteps) {
        step++;
        renderQuest();
    }
}

function prevQuest() {
    if (step > 0) {
        step--;
        renderQuest();
    }
}
</script>

</body>
</html>
